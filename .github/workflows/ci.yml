name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: rajawali_v2_test
          POSTGRES_USER: rajawali
          POSTGRES_PASSWORD: test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rajawali -d rajawali_v2_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: pdo_pgsql, redis
          coverage: none

      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer validate --strict --no-check-publish
      - run: composer audit
      - run: cp .env.example .env
      - run: php artisan key:generate
      - name: Validate PostgreSQL migrations and seeders
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: rajawali_v2_test
          DB_USERNAME: rajawali
          DB_PASSWORD: test_only
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate:fresh --seed --force
      - run: php artisan test
      - run: ./vendor/bin/pint --test

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run contract:check:typescript
      - run: npm run test
      - run: npm run build
      - run: npm run lint

  mobile-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run contract:check:dart

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug

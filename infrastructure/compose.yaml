name: rajawali-v2

services:
  api:
    build:
      context: ..
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-rajawali_v2}
      DB_USERNAME: ${POSTGRES_USER:-rajawali}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rajawali_local_only}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rajawali}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-rajawali_local_only}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: rajawali-v2-local
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      FILES_SCAN_DRIVER: clamav
      FILES_ALLOW_UNSCANNED: "false"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_started
  worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /app
    command: php artisan queue:work --tries=5 --timeout=120
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-rajawali_v2}
      DB_USERNAME: ${POSTGRES_USER:-rajawali}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rajawali_local_only}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rajawali}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-rajawali_local_only}
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: rajawali-v2-local
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      FILES_SCAN_DRIVER: clamav
      FILES_ALLOW_UNSCANNED: "false"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      FRONTEND_URL: http://localhost:5173
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    volumes:
      - ../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_started
      mailpit:
        condition: service_started
  scheduler:
    build:
      context: ..
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /app
    command: php artisan schedule:work
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-rajawali_v2}
      DB_USERNAME: ${POSTGRES_USER:-rajawali}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-rajawali_local_only}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rajawali_v2}
      POSTGRES_USER: ${POSTGRES_USER:-rajawali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rajawali_local_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rajawali}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rajawali_local_only}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done; mc mb --ignore-existing local/rajawali-v2-local
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rajawali}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rajawali_local_only}
    depends_on:
      - minio

  clamav:
    image: clamav/clamav:1.4.3
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav-data:/var/lib/clamav

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clamav-data:

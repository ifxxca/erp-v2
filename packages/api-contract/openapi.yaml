openapi: 3.1.0
info:
  title: Rajawali Platform API
  version: 0.1.0
  description: Contract-first API shared by ERP Web, Operations Web, and mobile.
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
paths:
  /me:
    get:
      operationId: getCurrentUser
      summary: Return the authenticated identity and active access context.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Unauthenticated.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rajawali_session
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CurrentUser:
      type: object
      required: [id, name, email, status]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [invited, active, suspended, disabled]

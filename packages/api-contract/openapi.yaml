openapi: 3.1.0
info:
  title: Rajawali Platform API
  version: 0.5.0
  description: Contract-first API shared by ERP Web, Operations Web, and mobile.
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
paths:
  /auth/login:
    post:
      operationId: login
      summary: Exchange active employee credentials for a surface-bound access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: A short-lived bearer token returned only once.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Login rate limit exceeded.
  /auth/password/forgot:
    post:
      operationId: requestPasswordReset
      summary: Request a single-use password-reset link without revealing account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Request accepted regardless of account eligibility.
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Password-reset request rate limit exceeded.
  /auth/password/reset:
    post:
      operationId: resetPassword
      summary: Consume a password-reset token and revoke all device sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Password changed and sessions revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: password_reset
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Password-reset attempt rate limit exceeded.
  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the bearer token used for this request.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Token revoked.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /auth/mfa:
    get:
      operationId: getMfaStatus
      summary: Return MFA enrollment and current-token assurance status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaStatus"
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/mfa/totp/enroll:
    post:
      operationId: enrollTotp
      summary: Start TOTP enrollment after password confirmation.
      description: Replaces any unconfirmed enrollment; the encrypted-at-rest secret is returned only for setup.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordConfirmation"
      responses:
        "200":
          description: Pending TOTP enrollment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpEnrollment"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Enrollment rate limit exceeded.
  /auth/mfa/totp/confirm:
    post:
      operationId: confirmTotp
      summary: Confirm a pending TOTP enrollment and issue recovery codes once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpCode"
      responses:
        "200":
          description: TOTP enabled and current token MFA-verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaActivation"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Confirmation rate limit exceeded.
  /auth/mfa/challenge:
    post:
      operationId: challengeMfa
      summary: Verify a TOTP or single-use recovery code for the current token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaChallenge"
      responses:
        "200":
          description: Current token MFA-verified and step-up window opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaChallengeResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Challenge rate limit exceeded.
  /auth/mfa/recovery-codes/regenerate:
    post:
      operationId: regenerateMfaRecoveryCodes
      summary: Invalidate all previous recovery codes and return a new set once.
      description: Requires MFA verified within 15 minutes.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New recovery-code set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCodeSet"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Regeneration rate limit exceeded.
  /auth/mfa/totp:
    delete:
      operationId: disableTotp
      summary: Disable optional TOTP and revoke every identity token.
      description: Requires recent MFA and password; denied while any privileged assignment is active.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordConfirmation"
      responses:
        "200":
          description: TOTP disabled and all tokens revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: disabled
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Disable rate limit exceeded.
  /auth/sessions:
    get:
      operationId: listSessions
      summary: List the authenticated identity's device tokens.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device-session list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeviceSession"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /auth/sessions/{tokenId}:
    delete:
      operationId: revokeSession
      summary: Revoke one device token owned by the authenticated identity.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenId"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status, current]
                properties:
                  status:
                    const: revoked
                  current:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Token is not owned by the authenticated identity.
  /auth/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      summary: Revoke all identity device tokens, optionally preserving the current token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllSessionsRequest"
      responses:
        "200":
          description: Matching sessions revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status, revoked_count, kept_current]
                properties:
                  status:
                    const: revoked
                  revoked_count:
                    type: integer
                    minimum: 0
                  kept_current:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Revoke-all rate limit exceeded.
  /auth/invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Activate an invited identity using a single-use token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "200":
          description: Identity activated.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: active
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Acceptance rate limit exceeded.
  /me:
    get:
      operationId: getCurrentUser
      summary: Return the authenticated identity.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/users/invitations:
    post:
      operationId: createUserInvitation
      summary: Invite an employee into one company with explicit department and location memberships.
      description: Requires identity.user.manage in the submitted company_id scope.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "201":
          description: Invitation created and sent; the plaintext token is never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/users/{userId}/companies/{companyId}/terminate:
    post:
      operationId: terminateCompanyMembership
      summary: Terminate one company membership and revoke stale access.
      description: Requires identity.user.manage in companyId. Self-termination is denied.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CompanyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Membership terminated.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: terminated
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User, company, or active membership not found.
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests:
    get:
      operationId: listPrivilegedAccessRequests
      summary: List the company access-review queue.
      description: Requires identity.access.approve in companyId.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccessRequestStatus"
      responses:
        "200":
          description: Paginated access requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestPage"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createPrivilegedAccessRequest
      summary: Request a time-bounded privileged role assignment.
      description: Requires identity.access.request and MFA verified within 15 minutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrivilegedAccessRequest"
      responses:
        "201":
          description: Pending request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivilegedAccessRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests/{accessRequestId}/approve:
    post:
      operationId: approvePrivilegedAccessRequest
      summary: Approve a pending request and atomically create its assignment.
      description: Requester, target, and approver must be different; recent MFA is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AccessRequestId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessDecision"
      responses:
        "200":
          description: Assignment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessApprovalResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or access request not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests/{accessRequestId}/reject:
    post:
      operationId: rejectPrivilegedAccessRequest
      summary: Reject a pending privileged access request.
      description: Requires identity.access.approve and recent MFA.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AccessRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRejection"
      responses:
        "200":
          description: Request rejected without creating an assignment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivilegedAccessRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or access request not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/role-assignments/{assignmentId}/revoke:
    post:
      operationId: revokePrivilegedRoleAssignment
      summary: Immediately revoke an assignment and all target-user device tokens.
      description: Requires identity.access.revoke and recent MFA.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AssignmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRevocation"
      responses:
        "200":
          description: Assignment revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRevocationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or assignment not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rajawali_session
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    AccessRequestId:
      name: accessRequestId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthenticated:
      description: Authentication failed or is missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated identity is inactive or lacks scoped permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationFailed:
      description: Request validation or lifecycle rule failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The requested lifecycle transition conflicts with current state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    LoginRequest:
      type: object
      required: [email, password, surface, device_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        surface:
          type: string
          enum: [erp_web, ops_web, mobile]
        device_name:
          type: string
          maxLength: 120
    TokenResponse:
      type: object
      required: [token_type, access_token, expires_at, mfa_required]
      properties:
        token_type:
          const: Bearer
        access_token:
          type: string
          description: Plaintext access token returned only at issuance.
        expires_at:
          type: string
          format: date-time
        mfa_required:
          type: boolean
          description: When true, call the MFA challenge before accessing protected application routes.
    PasswordConfirmation:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
    PasswordResetRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          format: password
          minLength: 12
        password_confirmation:
          type: string
          format: password
    RevokeAllSessionsRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
        keep_current:
          type: boolean
          default: false
    DeviceSession:
      type: object
      required:
        - id
        - device_name
        - surface
        - created_at
        - last_used_at
        - expires_at
        - mfa_verified_at
        - current
      properties:
        id:
          type: string
        device_name:
          type: string
        surface:
          type: string
          enum: [erp_web, ops_web, mobile, unknown]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: [string, "null"]
          format: date-time
        expires_at:
          type: [string, "null"]
          format: date-time
        mfa_verified_at:
          type: [string, "null"]
          format: date-time
        current:
          type: boolean
    TotpCode:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: "^[0-9]{6}$"
    MfaChallenge:
      type: object
      required: [credential]
      properties:
        credential:
          type: string
          minLength: 6
          maxLength: 64
          description: Six-digit TOTP or formatted recovery code.
    TotpEnrollment:
      type: object
      required: [secret, otpauth_url, status]
      properties:
        secret:
          type: string
          minLength: 32
          description: Setup secret returned only while enrollment is pending.
        otpauth_url:
          type: string
          format: uri
        status:
          const: pending
    RecoveryCodeSet:
      type: object
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          minItems: 8
          maxItems: 8
          uniqueItems: true
          items:
            type: string
    MfaActivation:
      allOf:
        - $ref: "#/components/schemas/RecoveryCodeSet"
        - type: object
          required: [status]
          properties:
            status:
              const: active
    MfaChallengeResponse:
      type: object
      required: [status, method, step_up_expires_at]
      properties:
        status:
          const: verified
        method:
          type: string
          enum: [totp, recovery_code]
        step_up_expires_at:
          type: string
          format: date-time
    MfaStatus:
      type: object
      required:
        - required
        - enabled
        - status
        - confirmed_at
        - unused_recovery_codes
        - current_token_verified_at
      properties:
        required:
          type: boolean
        enabled:
          type: boolean
        status:
          type: string
          enum: [not_configured, pending, active, disabled]
        confirmed_at:
          type: [string, "null"]
          format: date-time
        unused_recovery_codes:
          type: integer
          minimum: 0
        current_token_verified_at:
          type: [string, "null"]
          format: date-time
    AcceptInvitationRequest:
      type: object
      required: [token, password, password_confirmation]
      properties:
        token:
          type: string
          minLength: 64
          maxLength: 64
        password:
          type: string
          format: password
          minLength: 12
        password_confirmation:
          type: string
          format: password
    CreateInvitationRequest:
      type: object
      required:
        - name
        - email
        - company_id
        - department_ids
        - primary_department_id
        - valid_from
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        company_id:
          type: string
        employee_no:
          type: [string, "null"]
          maxLength: 64
        department_ids:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            type: string
        primary_department_id:
          type: string
          description: Must be included in department_ids.
        location_ids:
          type: array
          maxItems: 50
          uniqueItems: true
          items:
            type: string
        valid_from:
          type: string
          format: date
    InvitationResponse:
      type: object
      required: [id, user_id, status, expires_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        status:
          const: invited
        expires_at:
          type: string
          format: date-time
    CurrentUser:
      type: object
      required: [id, name, email, status]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [invited, active, suspended, disabled]
    AccessRequestStatus:
      type: string
      enum: [pending, approved, rejected, cancelled]
    CreatePrivilegedAccessRequest:
      type: object
      required: [target_user_id, role_id, reason, valid_until]
      properties:
        target_user_id:
          type: string
        role_id:
          type: string
          description: Must identify a role currently classified as privileged.
        department_id:
          type: [string, "null"]
        location_id:
          type: [string, "null"]
        reason:
          type: string
          maxLength: 2000
        valid_until:
          type: string
          format: date-time
          description: Must be in the future and no more than 90 days from request time.
    AccessDecision:
      type: object
      properties:
        note:
          type: [string, "null"]
          maxLength: 2000
    AccessRejection:
      type: object
      required: [note]
      properties:
        note:
          type: string
          maxLength: 2000
    AccessRevocation:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 2000
    PrivilegedAccessRequest:
      type: object
      required:
        - id
        - status
        - target_user
        - role
        - company_id
        - reason
        - valid_until
        - requested_by
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/AccessRequestStatus"
        target_user:
          $ref: "#/components/schemas/UserSummary"
        role:
          $ref: "#/components/schemas/RoleSummary"
        company_id:
          type: string
        department_id:
          type: [string, "null"]
        location_id:
          type: [string, "null"]
        reason:
          type: string
        valid_until:
          type: string
          format: date-time
        requested_by:
          $ref: "#/components/schemas/UserSummary"
        decided_by:
          oneOf:
            - $ref: "#/components/schemas/UserSummary"
            - type: "null"
        decided_at:
          type: [string, "null"]
          format: date-time
        decision_note:
          type: [string, "null"]
    UserSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
    RoleSummary:
      type: object
      required: [id, code, name]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
    AccessApprovalResponse:
      type: object
      required: [access_request_id, assignment_id, status, valid_until]
      properties:
        access_request_id:
          type: string
        assignment_id:
          type: string
        status:
          const: approved
        valid_until:
          type: string
          format: date-time
    AccessRevocationResponse:
      type: object
      required: [assignment_id, status, revoked_at]
      properties:
        assignment_id:
          type: string
        status:
          const: revoked
        revoked_at:
          type: string
          format: date-time
    AccessRequestPage:
      type: object
      required: [data, current_page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PrivilegedAccessRequest"
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

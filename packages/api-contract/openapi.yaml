openapi: 3.1.0
info:
  title: Rajawali Platform API
  version: 0.12.0
  description: Contract-first API shared by ERP Web, Operations Web, and mobile. Every API response returns X-Request-ID; authenticated business mutations may use Idempotency-Key for safe retry.
x-request-controls:
  correlation:
    request-header: X-Request-ID
    response-header: X-Request-ID
    invalid-or-missing: Server generates a ULID.
  idempotency:
    request-header: Idempotency-Key
    replay-header: Idempotency-Replayed
    retention-hours: 24
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
paths:
  /auth/login:
    post:
      operationId: login
      summary: Exchange active employee credentials for a surface-bound access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: A surface-bound token response; mobile also receives a rotating refresh token.
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/TokenResponse"
                  - $ref: "#/components/schemas/MobileTokenResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Login rate limit exceeded.
  /auth/mobile/refresh:
    post:
      operationId: refreshMobileToken
      summary: Rotate a mobile refresh token and replace its family-bound access token.
      description: Reuse of a consumed token revokes the entire device token family.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshMobileTokenRequest"
      responses:
        "200":
          description: New access and refresh tokens; the submitted refresh token is consumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenResponse"
        "401":
          description: Refresh token is unknown, consumed, expired, revoked, or belongs to an ineligible identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Refresh rate limit exceeded.
  /auth/password/forgot:
    post:
      operationId: requestPasswordReset
      summary: Request a single-use password-reset link without revealing account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Request accepted regardless of account eligibility.
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Password-reset request rate limit exceeded.
  /auth/password/reset:
    post:
      operationId: resetPassword
      summary: Consume a password-reset token and revoke all device sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: Password changed and sessions revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: password_reset
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Password-reset attempt rate limit exceeded.
  /auth/logout:
    post:
      operationId: logout
      summary: Revoke the bearer token used for this request.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Token revoked.
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /auth/mfa:
    get:
      operationId: getMfaStatus
      summary: Return MFA enrollment and current-token assurance status.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: MFA status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaStatus"
        "401":
          $ref: "#/components/responses/Unauthenticated"
  /auth/mfa/totp/enroll:
    post:
      operationId: enrollTotp
      summary: Start TOTP enrollment after password confirmation.
      description: Replaces any unconfirmed enrollment; the encrypted-at-rest secret is returned only for setup.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordConfirmation"
      responses:
        "200":
          description: Pending TOTP enrollment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TotpEnrollment"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Enrollment rate limit exceeded.
  /auth/mfa/totp/confirm:
    post:
      operationId: confirmTotp
      summary: Confirm a pending TOTP enrollment and issue recovery codes once.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TotpCode"
      responses:
        "200":
          description: TOTP enabled and current token MFA-verified.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaActivation"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Confirmation rate limit exceeded.
  /auth/mfa/challenge:
    post:
      operationId: challengeMfa
      summary: Verify a TOTP or single-use recovery code for the current token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaChallenge"
      responses:
        "200":
          description: Current token MFA-verified and step-up window opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaChallengeResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Challenge rate limit exceeded.
  /auth/mfa/recovery-codes/regenerate:
    post:
      operationId: regenerateMfaRecoveryCodes
      summary: Invalidate all previous recovery codes and return a new set once.
      description: Requires MFA verified within 15 minutes.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New recovery-code set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryCodeSet"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Regeneration rate limit exceeded.
  /auth/mfa/totp:
    delete:
      operationId: disableTotp
      summary: Disable optional TOTP and revoke every identity token.
      description: Requires recent MFA and password; denied while any privileged assignment is active.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordConfirmation"
      responses:
        "200":
          description: TOTP disabled and all tokens revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: disabled
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Disable rate limit exceeded.
  /auth/sessions:
    get:
      operationId: listSessions
      summary: List the authenticated identity's device tokens.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Device-session list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeviceSession"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /auth/sessions/{tokenId}:
    delete:
      operationId: revokeSession
      summary: Revoke one device token owned by the authenticated identity.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TokenId"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status, current]
                properties:
                  status:
                    const: revoked
                  current:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Token is not owned by the authenticated identity.
  /auth/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      summary: Revoke all identity device tokens, optionally preserving the current token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllSessionsRequest"
      responses:
        "200":
          description: Matching sessions revoked.
          content:
            application/json:
              schema:
                type: object
                required: [status, revoked_count, kept_current]
                properties:
                  status:
                    const: revoked
                  revoked_count:
                    type: integer
                    minimum: 0
                  kept_current:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Revoke-all rate limit exceeded.
  /auth/invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Activate an invited identity using a single-use token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "200":
          description: Identity activated.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: active
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Acceptance rate limit exceeded.
  /me:
    get:
      operationId: getCurrentUser
      summary: Return the authenticated identity.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/users/invitations:
    post:
      operationId: createUserInvitation
      summary: Invite an employee into one company with explicit department and location memberships.
      description: Requires identity.user.manage in the submitted company_id scope.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "201":
          description: Invitation created and sent; the plaintext token is never returned.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/users/{userId}/status:
    patch:
      operationId: changeIdentityStatus
      summary: Change the global lifecycle status of one identity.
      description: Requires the global identity.user.status.manage permission and MFA verified within 15 minutes. Self-change is denied; invited identities must use invitation acceptance; suspend and disable revoke all sessions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeIdentityStatusRequest"
      responses:
        "200":
          description: Identity status changed.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/IdentitySummary"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/users/{userId}/companies/{companyId}/terminate:
    post:
      operationId: terminateCompanyMembership
      summary: Terminate one company membership and revoke stale access.
      description: Requires identity.employment.manage in companyId. Self-termination is denied.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Membership terminated.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    const: terminated
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User, company, or active membership not found.
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/roles:
    get:
      operationId: listRoles
      summary: Return the global role and stable permission catalog.
      description: Requires global identity.role.view. System roles are projected as read-only; can_manage is derived server-side.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role and permission administration catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createRole
      summary: Create a non-global custom role and its initial permission mapping.
      description: Requires global identity.role.manage and MFA verified within 15 minutes. Global-only permissions are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Custom role created.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/roles/{roleId}:
    patch:
      operationId: updateRole
      summary: Update a custom role profile and classification.
      description: Requires global identity.role.manage and recent MFA. System roles are protected; classification changes conflict with active assignments or pending requests.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Custom role updated.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
    delete:
      operationId: deleteRole
      summary: Delete a custom role that has never been assigned or requested.
      description: Requires global identity.role.manage, recent MFA, and an auditable reason. System roles and roles with history are protected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleChangeReason"
      responses:
        "204":
          description: Custom role deleted.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/roles/{roleId}/permissions:
    put:
      operationId: syncRolePermissions
      summary: Replace the complete permission mapping of a custom role.
      description: Requires global identity.role.manage and recent MFA. Permission codes remain release-managed and global-only permissions are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRolePermissionsRequest"
      responses:
        "200":
          description: Permission mapping replaced.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies:
    get:
      operationId: listIdentityCompanies
      summary: List legal entities visible to the current identity administrator.
      description: Returns only companies where identity.user.view resolves, plus server-derived administration capabilities.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Visible legal entities and global capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityCompanyCollection"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/companies/{companyId}/organization:
    get:
      operationId: getIdentityOrganization
      summary: Return active departments and locations for one legal entity.
      description: Requires identity.user.view in companyId.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: Company organization catalog.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/OrganizationCatalog"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/companies/{companyId}/users:
    get:
      operationId: listIdentityUsers
      summary: Search and filter identities employed by one legal entity.
      description: Requires identity.user.view in companyId. Historical and active employment records both establish directory membership.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/IdentityStatus"
        - name: employment_status
          in: query
          schema:
            $ref: "#/components/schemas/EmploymentStatus"
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated company identity directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityUserPage"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/users/{userId}:
    get:
      operationId: getIdentityUser
      summary: Return company-scoped employment and organization history for one identity.
      description: Requires identity.user.view in companyId. Cross-company records are never included.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Company-scoped identity detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/IdentityUser"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User is not employed by the requested company.
  /identity/companies/{companyId}/users/{userId}/organization-memberships:
    put:
      operationId: updateOrganizationMemberships
      summary: Schedule a complete replacement of department and location memberships.
      description: Requires identity.employment.manage in companyId. Existing memberships are closed one day before the effective date and retained as history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationMembershipsRequest"
      responses:
        "200":
          description: Organization change scheduled.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipUpdateResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Active employment does not exist in the requested company.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/users/{userId}/role-assignments:
    get:
      operationId: listStandardRoleAssignments
      summary: Return the standard-access catalog and direct assignment history for one identity.
      description: Requires identity.access.assign in companyId. Privileged and global roles are excluded.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Standard roles and direct assignment history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardAccessCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User is not employed by the requested company.
    post:
      operationId: createStandardRoleAssignment
      summary: Assign a standard role directly within a covered organization scope.
      description: Requires identity.access.assign and recent MFA. Self-assignment, privileged roles, global roles, overlapping periods, and periods outside the target's memberships are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStandardRoleAssignmentRequest"
      responses:
        "201":
          description: Standard role assigned.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardRoleAssignmentResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User is not employed by the requested company.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/users/{userId}/role-assignments/{assignmentId}/revoke:
    post:
      operationId: revokeStandardRoleAssignment
      summary: Revoke a direct standard role assignment.
      description: Requires identity.access.assign and recent MFA. Privileged workflow assignments and self-revocation are rejected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/AssignmentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeStandardRoleAssignmentRequest"
      responses:
        "200":
          description: Standard role assignment revoked.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardRoleAssignmentResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Direct assignment was not found for this company and user.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests:
    get:
      operationId: listPrivilegedAccessRequests
      summary: List the company access-review queue.
      description: Requires identity.access.approve in companyId.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AccessRequestStatus"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated access requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestPage"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createPrivilegedAccessRequest
      summary: Request a time-bounded privileged role assignment.
      description: Requires identity.access.request and MFA verified within 15 minutes.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrivilegedAccessRequest"
      responses:
        "201":
          description: Pending request created.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivilegedAccessRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests/mine:
    get:
      operationId: listMyPrivilegedAccessRequests
      summary: List privileged-access requests created by the current user.
      description: Requires identity.access.request in companyId and never returns another maker's history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated maker request history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestPage"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/companies/{companyId}/access-catalog:
    get:
      operationId: getPrivilegedAccessCatalog
      summary: Return eligible target users and company-assignable privileged roles.
      description: Requires identity.access.request. Global-only roles are intentionally excluded and organization membership IDs constrain the available scope choices.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: Privileged-access request catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessCatalogResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /identity/companies/{companyId}/access-requests/{accessRequestId}/approve:
    post:
      operationId: approvePrivilegedAccessRequest
      summary: Approve a pending request and atomically create its assignment.
      description: Requester, target, and approver must be different; recent MFA is required.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AccessRequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessDecision"
      responses:
        "200":
          description: Assignment created.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessApprovalResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or access request not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/access-requests/{accessRequestId}/reject:
    post:
      operationId: rejectPrivilegedAccessRequest
      summary: Reject a pending privileged access request.
      description: Requires identity.access.approve and recent MFA.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AccessRequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRejection"
      responses:
        "200":
          description: Request rejected without creating an assignment.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivilegedAccessRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or access request not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/role-assignments/{assignmentId}/revoke:
    post:
      operationId: revokePrivilegedRoleAssignment
      summary: Immediately revoke an assignment and all target-user device tokens.
      description: Requires identity.access.revoke and recent MFA.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/AssignmentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRevocation"
      responses:
        "200":
          description: Assignment revoked.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRevocationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Company or assignment not found in the requested scope.
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /identity/companies/{companyId}/role-assignments:
    get:
      operationId: listActivePrivilegedRoleAssignments
      summary: List active privileged assignments available for emergency revocation.
      description: Requires identity.access.revoke in companyId.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        "200":
          description: Paginated active privileged assignments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentPage"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
  /companies/{companyId}/files:
    post:
      operationId: initiateFileUpload
      summary: Reserve private object metadata before uploading its binary.
      description: Requires file.asset.create in companyId. The returned content endpoint deliberately does not accept Idempotency-Key; retries reuse the reservation and checksum.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateFileRequest"
      responses:
        "201":
          description: Private upload reservation and multipart upload instruction.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInitiatedResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationFailed"
  /companies/{companyId}/files/{fileId}/content:
    post:
      operationId: uploadFileContent
      summary: Upload the reserved binary for server-side structural validation.
      description: Requires reservation ownership and file.asset.create. Idempotency-Key is not supported for multipart binary payloads.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/FileId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Binary accepted after size, SHA-256, MIME, and signature validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "429":
          description: Upload rate limit exceeded.
  /companies/{companyId}/files/{fileId}/finalize:
    post:
      operationId: finalizeFileUpload
      summary: Quarantine an uploaded file and request asynchronous malware scanning.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/FileId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Scan requested; status may already be ready when a synchronous worker is used.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /companies/{companyId}/files/{fileId}:
    get:
      operationId: getFileMetadata
      summary: Read authorized metadata without exposing the private object key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: Company-scoped file metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: File is outside the requested company.
    delete:
      operationId: deleteFile
      summary: Remove the private binary while preserving metadata and audit history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/FileId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Binary deleted and metadata tombstoned.
          headers:
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /companies/{companyId}/files/{fileId}/download:
    get:
      operationId: downloadFile
      summary: Stream a ready, malware-accepted private file after authorization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CompanyId"
        - $ref: "#/components/parameters/FileId"
      responses:
        "200":
          description: Original binary with a safe attachment filename.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          description: Download rate limit exceeded.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rajawali_session
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: Client correlation identifier. Invalid or missing values are replaced with a server-generated ULID and returned in every response.
      schema:
        type: string
        minLength: 8
        maxLength: 128
        pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{7,127}$"
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: A client-generated key for safely retrying an authenticated business mutation. Reuse with another route or payload returns 409.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]{15,127}$"
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    FileId:
      name: fileId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    AccessRequestId:
      name: accessRequestId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    RoleId:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9A-HJKMNP-TV-Z]{26}$"
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    Unauthenticated:
      description: Authentication failed or is missing.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated identity is inactive or lacks scoped permission.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationFailed:
      description: Request validation or lifecycle rule failed.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The requested lifecycle transition conflicts with current state.
      headers:
        X-Request-ID:
          $ref: "#/components/headers/XRequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  headers:
    XRequestId:
      description: Correlation identifier for logs, audit records, and support diagnostics.
      required: true
      schema:
        type: string
    IdempotencyReplayed:
      description: True when the response was replayed from a completed request instead of executing the command again.
      schema:
        type: string
        enum: ["true", "false"]
  schemas:
    InitiateFileRequest:
      type: object
      required: [purpose, original_name, mime_type, size, checksum_sha256]
      properties:
        purpose:
          type: string
          enum: [checklist_evidence, vehicle_document, work_order_attachment]
        original_name:
          type: string
          maxLength: 255
        mime_type:
          type: string
          enum: [application/pdf, image/jpeg, image/png, image/webp]
        size:
          type: integer
          minimum: 1
          maximum: 20971520
        checksum_sha256:
          type: string
          pattern: "^[a-fA-F0-9]{64}$"
    FileAsset:
      type: object
      required: [id, company_id, created_by, purpose, original_name, mime_type, size, checksum_sha256, status, scan_status, pending_expires_at, created_at]
      properties:
        id:
          type: string
        company_id:
          type: string
        created_by:
          type: string
        purpose:
          type: string
        original_name:
          type: string
        mime_type:
          type: string
        size:
          type: integer
        checksum_sha256:
          type: string
        status:
          type: string
          enum: [pending, uploaded, quarantined, ready, rejected, deleted, expired]
        scan_status:
          type: string
          enum: [not_started, pending, clean, infected, failed, skipped]
        rejection_reason:
          type: [string, "null"]
        attached_type:
          type: [string, "null"]
        attached_id:
          type: [string, "null"]
        pending_expires_at:
          type: string
          format: date-time
        retention_until:
          type: [string, "null"]
          format: date-time
        uploaded_at:
          type: [string, "null"]
          format: date-time
        finalized_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
    FileResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/FileAsset"
    FileInitiatedResponse:
      type: object
      required: [data, upload]
      properties:
        data:
          $ref: "#/components/schemas/FileAsset"
        upload:
          type: object
          required: [method, url, content_type, field, expires_at]
          properties:
            method:
              const: POST
            url:
              type: string
            content_type:
              const: multipart/form-data
            field:
              const: file
            expires_at:
              type: string
              format: date-time
    LoginRequest:
      type: object
      required: [email, password, surface, device_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        surface:
          type: string
          enum: [erp_web, ops_web, mobile]
        device_name:
          type: string
          maxLength: 120
    TokenResponse:
      type: object
      required: [token_type, access_token, expires_at, mfa_required]
      properties:
        token_type:
          const: Bearer
        access_token:
          type: string
          description: Plaintext access token returned only at issuance.
        expires_at:
          type: string
          format: date-time
        mfa_required:
          type: boolean
          description: When true, call the MFA challenge before accessing protected application routes.
    MobileTokenResponse:
      allOf:
        - $ref: "#/components/schemas/TokenResponse"
        - type: object
          required: [refresh_token, refresh_expires_at]
          properties:
            refresh_token:
              type: string
              description: Rotating plaintext secret returned only at issuance; store in OS-protected secure storage.
            refresh_expires_at:
              type: string
              format: date-time
              description: Absolute family expiry; rotation never extends it.
    RefreshMobileTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          maxLength: 512
    PasswordConfirmation:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
    PasswordResetRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          format: password
          minLength: 12
        password_confirmation:
          type: string
          format: password
    RevokeAllSessionsRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
        keep_current:
          type: boolean
          default: false
    DeviceSession:
      type: object
      required:
        - id
        - device_name
        - surface
        - created_at
        - last_used_at
        - expires_at
        - mfa_verified_at
        - current
      properties:
        id:
          type: string
        device_name:
          type: string
        surface:
          type: string
          enum: [erp_web, ops_web, mobile, unknown]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: [string, "null"]
          format: date-time
        expires_at:
          type: [string, "null"]
          format: date-time
        mfa_verified_at:
          type: [string, "null"]
          format: date-time
        current:
          type: boolean
    TotpCode:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: "^[0-9]{6}$"
    MfaChallenge:
      type: object
      required: [credential]
      properties:
        credential:
          type: string
          minLength: 6
          maxLength: 64
          description: Six-digit TOTP or formatted recovery code.
    TotpEnrollment:
      type: object
      required: [secret, otpauth_url, status]
      properties:
        secret:
          type: string
          minLength: 32
          description: Setup secret returned only while enrollment is pending.
        otpauth_url:
          type: string
          format: uri
        status:
          const: pending
    RecoveryCodeSet:
      type: object
      required: [recovery_codes]
      properties:
        recovery_codes:
          type: array
          minItems: 8
          maxItems: 8
          uniqueItems: true
          items:
            type: string
    MfaActivation:
      allOf:
        - $ref: "#/components/schemas/RecoveryCodeSet"
        - type: object
          required: [status]
          properties:
            status:
              const: active
    MfaChallengeResponse:
      type: object
      required: [status, method, step_up_expires_at]
      properties:
        status:
          const: verified
        method:
          type: string
          enum: [totp, recovery_code]
